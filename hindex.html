<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Guia de Psicologia</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: #333;
  }
  .nome-container {
    text-align: center;
    margin-bottom: 10px;
  }
  .nome {
    font-size: 20px;
    font-weight: bold;
    color: #555;
  }
  .instituicoes {
    font-size: 14px;
    color: #777;
  }
  .menu {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 20px;
  }
  button {
    background-color: #4CAF50;
    color: white;
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  button:hover {
    background-color: #45a049;
  }
  #conteudo {
    background-color: #fff;
    padding: 20px;
    border-radius: 8px;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>

<h1>Guia Completo de Psicologia</h1>
<div class="nome-container">
  <div class="nome">Marsuély Vitória dos Santos da Silva</div>
  <div class="instituicoes">Colégio Dom Pedro II | 3 A</div>
</div>

<div class="menu">
  <button onclick="mostrarConteudo('lado_bom')">Lado Bom</button>
  <button onclick="mostrarConteudo('reunem')">Reúnem</button>
  <button onclick="mostrarConteudo('tempo_curso')">Tempo de Curso</button>
  <button onclick="mostrarConteudo('salario')">Salário</button>
  <button onclick="mostrarConteudo('origem')">Origem</button>
  <button onclick="mostrarConteudo('como_surgiu')">Como surgiu</button>
  <button onclick="mostrarConteudo('curiosidades')">Curiosidades</button>
  <button onclick="mostrarConteudo('dicas')">Dicas</button>
</div>

<div id="conteudo">
  <p>Selecione uma opção acima para obter informações.</p>
</div>

<script>
const conteudos = {
  lado_bom: `
    <h2>Lado bom da profissão</h2>
    <p>Aspectos positivos da profissão de psicólogo:
    - Contribuir para a melhora da saúde mental e qualidade de vida das pessoas.
    - Trabalhar em diversas áreas, como clínica, escolar, organizacional, esportiva, social e pesquisa.
    - Possibilidade de atuar de forma autônoma, abrindo consultório próprio ou oferecendo serviços online.
    - Desenvolvimento de habilidades interpessoais, empatia, escuta ativa e comunicação eficaz.
    - Crescimento pessoal ao compreender diferentes comportamentos e trajetórias humanas.
    - Trabalho flexível com possibilidade de horários adaptáveis e ambientes variados.
    - Participação em projetos sociais, educativos, políticos e de pesquisa.
    - Alta demanda no mercado, especialmente em tempos de maior conscientização sobre saúde mental.
    - Potencial para especializações que aumentam a valorização profissional e ganhos financeiros.
    - Contribuir para a construção de uma sociedade mais empática e saudável.</p>
  `,
  reunem: `
    <h2>Quem atua na área</h2>
    <p>Profissionais que atuam na área da Psicologia vêm de diferentes formações e atuam em diversos contextos:
    - Psicólogos clínicos atendem pacientes em consultórios, hospitais, clínicas e centros de saúde.
    - Psicólogos escolares atuam em escolas, universidades e programas de apoio ao estudante.
    - Psicólogos organizacionais trabalham com recursos humanos, recrutamento, treinamento e desenvolvimento.
    - Psicólogos esportivos auxiliam atletas na preparação mental e controle de desempenho.
    - Psicólogos sociais atuam em ONGs, programas governamentais, projetos de inclusão social.
    - Neuropsicólogos avaliam funções cognitivas e reabilitam déficits relacionados ao cérebro.
    - Psicoterapeutas utilizam diferentes abordagens terapêuticas para tratamento de transtornos.
    - Pesquisadores e professores atuam na academia, contribuindo com estudos e formação de novas gerações.
    - Muitos profissionais trabalham de forma autônoma, oferecendo atendimentos particulares, palestras e cursos.
    Ambientes de trabalho incluem hospitais, escolas, empresas, clínicas, instituições de pesquisa e órgãos públicos.</p>
  `,
  tempo_curso: `
    <h2>Tempo de curso</h2>
    <p>A graduação em Psicologia costuma ter duração de 4 a 5 anos, dependendo da instituição e do país.
    - O curso inclui disciplinas teóricas, práticas, estágios supervisionados e projetos de pesquisa.
    - É obrigatório realizar estágio supervisionado para adquirir experiência prática.
    - Após a graduação, há possibilidades de especialização, mestrado e doutorado.
    - Cursos de pós-graduação variam de 1 a 3 anos e permitem atuação em áreas específicas.
    - Investir em cursos de atualização, workshops e treinamentos contínuos é fundamental para se destacar.
    - Algumas instituições oferecem programas de formação mais rápidos, mas a formação completa é recomendada.
    - A formação ética e o desenvolvimento de habilidades de escuta, análise e intervenção são essenciais.</p>
  `,
  salario: `
    <h2>Salário médio</h2>
    <p>O salário de um psicólogo pode variar bastante com base na experiência, especializações, região e setor de atuação:
    - Profissionais iniciantes podem ganhar entre R$ 2.500 a R$ 4.000 mensais.
    - Psicólogos com experiência e especializações podem alcançar salários de R$ 5.000 a R$ 8.000 ou mais.
    - Psicólogos autônomos podem definir seus próprios valores por sessão, podendo variar de R$ 100 a R$ 300 ou mais.
    - Trabalhar em instituições públicas oferece estabilidade, mas geralmente salários mais baixos.
    - No setor privado, há potencial de ganhos maiores, especialmente com uma boa rede de clientes.
    - Algumas áreas de atuação, como neuropsicologia ou psicoterapia, tendem a pagar melhor.
    - Além do salário fixo, ganhos com palestras, cursos e atendimentos particulares aumentam o rendimento.</p>
  `,
  origem: `
    <h2>Origem da Psicologia</h2>
    <p>A Psicologia surgiu no final do século XIX, como uma tentativa de compreender o comportamento humano de forma científica.
    - Wilhelm Wundt, na Alemanha, fundou o primeiro laboratório de Psicologia em 1879, marcando o início da disciplina.
    - Inicialmente, focava no estudo de processos mentais, percepção, sensações e atenção, usando métodos experimentais.
    - No século XX, diferentes abordagens teóricas emergiram, como o behaviorismo, a psicanálise, o humanismo e o cognitivismo.
    - A profissão foi regulamentada em vários países ao longo do tempo, com conselhos e códigos de ética.
    - A origem da Psicologia está relacionada à busca por entender o comportamento humano de forma objetiva e científica.
    - A evolução histórica permitiu a diversificação de técnicas de avaliação, intervenção e pesquisa.</p>
  `,
  como_surgiu: `
    <h2>Como surgiu a Psicologia</h2>
    <p>A psicologia surgiu da necessidade de explicar o comportamento humano com métodos científicos e empíricos.
    - Antes disso, explicações eram baseadas em crenças filosóficas, religiosas ou empirismo sem rigor científico.
    - Wilhelm Wundt e outros pioneiros estabeleceram a psicologia como ciência, usando experimentos e observações sistemáticas.
    - Com o passar do tempo, novas abordagens surgiram, cada uma com foco distinto:
      - Behaviorismo: ênfase no comportamento observável e na aprendizagem.
      - Psicanálise: foco no inconsciente, emoções e experiências passadas.
      - Psicologia Humanista: busca compreender o potencial humano e autorrealização.
      - Cognitivismo: estudo dos processos mentais internos, como memória, atenção e resolução de problemas.
    - A evolução dessas abordagens ampliou a compreensão do comportamento, levando à criação de técnicas variadas de intervenção e avaliação.
    </p>
  `,
  dicas: `
    <h2>Dicas para quem quer seguir essa carreira</h2>
    <ul>
      <li>Invista na sua formação acadêmica com dedicação e busca constante por atualização.</li>
      <li>Desenvolva habilidades de escuta ativa, empatia, comunicação e resolução de conflitos.</li>
      <li>Faça estágios e práticas supervisionadas para adquirir experiência real.</li>
      <li>Participe de grupos de estudo, eventos e congressos para ampliar sua rede de contatos.</li>
      <li>Busque especializações que estejam alinhadas às suas áreas de interesse.</li>
      <li>Mantenha-se atualizado com as novas técnicas, abordagens e legislações.</li>
      <li>Seja ético, responsável e comprometido com o bem-estar do seu cliente.</li>
      <li>Considere atuar em diferentes áreas para ampliar suas oportunidades de trabalho.</li>
    </ul>
  `
};

function mostrarConteudo(topico) {
  document.getElementById('conteudo').innerHTML = conteudos[topico] || "<p>Conteúdo não disponível.</p>";
}

// Carregar conteúdo inicial
mostrarConteudo('lado_bom');
</script>

</body>
</html>
